<!DOCTYPE html>
<html>
<head>
    <title>수정하기</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <h1 class="text-2xl font-bold mb-4">
        #{{ skill["id"] }} 데이터 수정 중  <!-- 가이드라인 변수명 skill로 매핑 -->
    </h1>

    <!-- 가이드라인 액션 주소 /update/<skill_id> 매핑 -->
    <form action="/update/{{ skill['id'] }}" method="POST" class="space-y-3">
        <div>
            <label class="block mb-1 font-bold">기술명</label>
            <input
                type="text"
                name="name"  <!-- 가이드라인 필드명 name 적용 -->
                value="{{ skill['name'] }}"  <!-- name 값 매핑 -->
                class="border px-3 py-2 rounded w-full"
                required
            >
        </div>

        <div>
            <label class="block mb-1 font-bold">수준</label>
            <input
                type="text"
                name="level"
                value="{{ skill['level'] if skill['level'] else 'N/A' }}"
                class="border px-3 py-2 rounded w-full"
            >
        </div>

        <div>
            <label class="block mb-1 font-bold">학습 상태</label>
            <input
                type="text"
                name="status"  <!-- 가이드라인 필드명 status 적용 -->
                value="{{ skill['status'] }}"  <!-- status 값 매핑 -->
                class="border px-3 py-2 rounded w-full"
                required
            >
        </div>

        <button
            type="submit"
            class="bg-green-500 text-white px-4 py-2 rounded"
        >
            수정 완료
        </button>
    </form>

    <a href="/" class="inline-block mt-4 text-blue-600">돌아가기</a>
</body>
</html>
