<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>
</head>
<body>

<div id="dp" class="fixed bottom-8 right-8 z-50 select-none">
<style>
#dp{
  width:96px;
  height:96px;
  border-radius:50%;
  overflow:hidden;
  position:fixed;
  background:rgba(12,12,20,.82);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.09);
  box-shadow:0 10px 35px rgba(0,0,0,.28);
  transition:
    width .45s cubic-bezier(.4,0,.2,1),
    height .45s cubic-bezier(.4,0,.2,1),
    border-radius .45s cubic-bezier(.4,0,.2,1);
}

/* LIGHT THEME */
#dp.light{
  background:rgba(250,250,252,.9);
  border:1px solid rgba(0,0,0,.08);
  box-shadow:0 10px 35px rgba(0,0,0,.08);
}

/* MINI */
#dp-mini{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:1;
  transition:opacity .25s;
  pointer-events:none;
}

#dp.expanded{
  width:278px;
  height:318px;
  border-radius:26px;
  overflow:visible;
}

#dp.expanded #dp-mini{
  opacity:0;
}

/* FULL */
#dp-full{
  position:absolute;
  inset:0;
  opacity:0;
  pointer-events:none;
  transition:opacity .28s .05s;
  display:flex;
  flex-direction:column;
  border-radius:26px;
  overflow:hidden;
}

#dp.expanded #dp-full{
  opacity:1;
  pointer-events:auto;
}

/* DISK */
.dp-disk{
  position:relative;
  border-radius:50%;
  overflow:hidden;
  background:#181824;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

#mini-disk{
  width:68px;
  height:68px;
}

#big-disk{
  width:108px;
  height:108px;
  border:1px solid rgba(255,255,255,.08);
}

#dp.light #big-disk{
  border-color:rgba(0,0,0,.08);
}

.dp-disk::after{
  content:'';
  position:absolute;
  width:13px;
  height:13px;
  border-radius:50%;
  background:#0f0f15;
  border:1px solid rgba(255,255,255,.08);
  z-index:2;
}

#dp.light .dp-disk::after{
  background:#e8e8f0;
  border-color:rgba(0,0,0,.08);
}

.dp-img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
}

/* SPIN */
@keyframes dp-spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.dp-spin{
  animation:dp-spin 9s linear infinite;
}

.dp-spin.dp-paused{
  animation-play-state:paused;
}

/* TOP */
#dp-top{
  padding:12px 12px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-shrink:0;
}

#dp-name{
  font-size:9.5px;
  letter-spacing:.07em;
  color:rgba(255,255,255,.45);
  border:1px solid rgba(255,255,255,.09);
  background:rgba(255,255,255,.06);
  padding:5px 10px;
  border-radius:999px;
  font-family:monospace;
  max-width:130px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

#dp.light #dp-name{
  color:rgba(0,0,0,.42);
  border-color:rgba(0,0,0,.08);
  background:rgba(0,0,0,.04);
}

/* ACTIONS */
#dp-top-actions{
  display:flex;
  align-items:center;
  gap:6px;
}

.dp-icon-btn{
  width:26px;
  height:26px;
  border:none;
  background:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  padding:0;
  flex-shrink:0;
  color:rgba(255,255,255,.38);
  transition:color .18s;
}

#dp.light .dp-icon-btn{
  color:rgba(0,0,0,.36);
}

.dp-icon-btn:hover{
  color:rgba(255,255,255,.9);
}

#dp.light .dp-icon-btn:hover{
  color:rgba(0,0,0,.9);
}

.dp-icon-btn.active{
  color:#fff;
}

#dp.light .dp-icon-btn.active{
  color:#000;
}

.dp-icon-btn svg{
  width:14px;
  height:14px;
  stroke:currentColor;
  fill:none;
  stroke-width:1.7;
  stroke-linecap:round;
  stroke-linejoin:round;
  overflow:visible;
}

/* CENTER */
#dp-center{
  flex:1;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

#dp-viz,
#dp-mini-viz{
  position:absolute;
  pointer-events:none;
}

/* BOTTOM */
#dp-bottom{
  margin:0 10px 10px;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.07);
  padding:8px 11px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}

#dp.light #dp-bottom{
  background:rgba(0,0,0,.03);
  border-color:rgba(0,0,0,.07);
}

#dp-time{
  font-size:9.5px;
  color:rgba(255,255,255,.3);
  min-width:30px;
  font-family:monospace;
}

#dp.light #dp-time{
  color:rgba(0,0,0,.32);
}

#dp-progress{
  flex:1;
  height:3px;
  border-radius:999px;
  background:rgba(255,255,255,.09);
  overflow:hidden;
  cursor:pointer;
}

#dp.light #dp-progress{
  background:rgba(0,0,0,.09);
}

#dp-progress-fill{
  width:0%;
  height:100%;
  background:rgba(255,255,255,.6);
  border-radius:999px;
}

#dp.light #dp-progress-fill{
  background:rgba(0,0,0,.55);
}

#dp-play{
  width:32px;
  height:32px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

#dp.light #dp-play{
  background:#111;
}

#dp-play svg{
  width:12px;
  height:12px;
  fill:black;
  stroke:none;
}

#dp.light #dp-play svg{
  fill:white;
}

/* DRAG HANDLE — outside #dp-full so it doesn't overlap controls */
#dp-drag{
  position:absolute;
  bottom:7px;
  right:9px;
  display:flex;
  flex-direction:column;
  gap:2.5px;
  cursor:grab;
  padding:4px;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s;
  z-index:20;
}

#dp.expanded #dp-drag{
  opacity:1;
  pointer-events:auto;
}

#dp-drag span{
  display:block;
  height:1.8px;
  background:rgba(255,255,255,.22);
  border-radius:2px;
}

#dp.light #dp-drag span{
  background:rgba(0,0,0,.2);
}

#dp-drag span:nth-child(1){width:13px;}
#dp-drag span:nth-child(2){width:8px;}
#dp-drag span:nth-child(3){width:4px;}
</style>

<!-- MINI -->
<div id="dp-mini">
  <canvas id="dp-mini-viz" width="96" height="96"></canvas>
  <div class="dp-disk" id="mini-disk">
    <img class="dp-img" id="mini-img" src="/static/yesterday.webp">
  </div>
</div>

<!-- FULL -->
<div id="dp-full">

  <div id="dp-top">
    <div id="dp-name">YESTERDAY.MP3</div>
    <div id="dp-top-actions">

      <!-- THEME -->
      <button class="dp-icon-btn" id="dp-theme-btn" title="테마 전환">
        <svg id="dp-theme-icon" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2" x2="12" y2="4"/>
          <line x1="12" y1="20" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="4" y2="12"/>
          <line x1="20" y1="12" x2="22" y2="12"/>
          <line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/>
          <line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/>
          <line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/>
          <line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/>
        </svg>
      </button>

      <!-- PIN -->
      <button class="dp-icon-btn" id="dp-pin-btn" title="고정">
        <svg viewBox="0 0 24 24">
          <line x1="12" y1="17" x2="12" y2="22"/>
          <path d="M5 17h14"/>
          <path d="M15 5h1a2 2 0 0 1 2 2v1a4 4 0 0 1-4 4H10a4 4 0 0 1-4-4V7a2 2 0 0 1 2-2h1"/>
          <line x1="12" y1="2" x2="12" y2="5"/>
        </svg>
      </button>

    </div>
  </div>

  <!-- CENTER -->
  <div id="dp-center">
    <canvas id="dp-viz" width="160" height="160"></canvas>
    <div class="dp-disk" id="big-disk">
      <img class="dp-img" id="big-img" src="/static/yesterday.webp">
    </div>
  </div>

  <!-- BOTTOM -->
  <div id="dp-bottom">
    <span id="dp-time">00:00</span>
    <div id="dp-progress">
      <div id="dp-progress-fill"></div>
    </div>
    <button id="dp-play">
      <svg id="dp-play-icon" viewBox="0 0 24 24"><path d="M6 4l14 8-14 8V4z"/></svg>
      <svg id="dp-pause-icon" viewBox="0 0 24 24" style="display:none"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
    </button>
  </div>

</div>

<!-- DRAG HANDLE: inside #dp but outside #dp-full -->
<div id="dp-drag">
  <span></span><span></span><span></span>
</div>

<audio id="dp-audio" preload="auto">
  <source src="/static/yesterday.mp3" type="audio/mpeg">
</audio>

</div>

<script>
(() => {

const dp            = document.getElementById('dp');
const audio         = document.getElementById('dp-audio');
const miniImg       = document.getElementById('mini-img');
const bigImg        = document.getElementById('big-img');

const playBtn       = document.getElementById('dp-play');
const playIcon      = document.getElementById('dp-play-icon');
const pauseIcon     = document.getElementById('dp-pause-icon');
const progress      = document.getElementById('dp-progress');
const progressFill  = document.getElementById('dp-progress-fill');
const timeEl        = document.getElementById('dp-time');
const pinBtn        = document.getElementById('dp-pin-btn');
const themeBtn      = document.getElementById('dp-theme-btn');
const themeIcon     = document.getElementById('dp-theme-icon');
const dragEl        = document.getElementById('dp-drag');
const vizCanvas     = document.getElementById('dp-viz');
const miniCanvas    = document.getElementById('dp-mini-viz');
const vCtx          = vizCanvas.getContext('2d');
const mCtx          = miniCanvas.getContext('2d');

let pinned    = false;
let isDragging= false;
let light     = false;
let analyser  = null;
let dataArray = null;

/* ── COLOUR PALETTES ── */
const darkBars = [
  [160,210,255],[180,160,255],[120,220,195],
  [255,195,155],[195,195,255],[140,230,210],
];
const lightBars = [
  [70,130,210],[120,80,200],[20,155,135],
  [210,110,50],[90,70,195],[50,160,170],
];

function barRgb(i, n){
  const arr = light ? lightBars : darkBars;
  return arr[Math.floor(i / n * arr.length) % arr.length];
}

/* ── WEB AUDIO (real mp3 source) ── */
function initAudio(){
  if(analyser) return;
  try{
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const src = ac.createMediaElementSource(audio);
    analyser = ac.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = .85;
    src.connect(analyser);
    analyser.connect(ac.destination);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    if(ac.state === 'suspended') ac.resume();
  }catch(e){}
}

/* ── PLAY / PAUSE ── */
function syncPlay(state){
  playIcon.style.display  = state ? 'none' : '';
  pauseIcon.style.display = state ? '' : 'none';
  [miniImg, bigImg].forEach(el => {
    el.classList.toggle('dp-spin',   state);
    el.classList.toggle('dp-paused', !state);
  });
}

playBtn.onclick = () => {
  initAudio();
  if(audio.paused){ audio.play(); } else { audio.pause(); }
};

audio.addEventListener('play',  () => syncPlay(true));
audio.addEventListener('pause', () => syncPlay(false));
audio.addEventListener('ended', () => syncPlay(false));

/* ── TIMELINE ── */
audio.addEventListener('timeupdate', () => {
  const c = audio.currentTime;
  const d = audio.duration || 0;
  progressFill.style.width = (c / d * 100) + '%';
  timeEl.textContent =
    String(Math.floor(c / 60)).padStart(2,'0') + ':' +
    String(Math.floor(c % 60)).padStart(2,'0');
});

progress.onclick = e => {
  if(!audio.duration) return;
  audio.currentTime = (e.offsetX / progress.clientWidth) * audio.duration;
};

/* ── EXPAND / COLLAPSE ── */
function expand(){  dp.classList.add('expanded'); }
function collapse(){
  if(pinned || isDragging) return;
  dp.classList.remove('expanded');
}

document.addEventListener('mousemove', e => {
  if(isDragging) return;
  const r = dp.getBoundingClientRect();
  const inside =
    e.clientX >= r.left && e.clientX <= r.right &&
    e.clientY >= r.top  && e.clientY <= r.bottom;
  inside ? expand() : collapse();
});

/* ── PIN ── */
pinBtn.onclick = e => {
  e.stopPropagation();
  pinned = !pinned;
  pinBtn.classList.toggle('active', pinned);
  if(!pinned) collapse();
};

/* ── THEME ── */
const moonSVG = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
const sunSVG  = `
  <circle cx="12" cy="12" r="4"/>
  <line x1="12" y1="2" x2="12" y2="4"/>
  <line x1="12" y1="20" x2="12" y2="22"/>
  <line x1="2" y1="12" x2="4" y2="12"/>
  <line x1="20" y1="12" x2="22" y2="12"/>
  <line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/>
  <line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/>
  <line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/>
  <line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/>
`;

themeBtn.onclick = () => {
  light = !light;
  dp.classList.toggle('light', light);
  themeIcon.innerHTML = light ? moonSVG : sunSVG;
};

/* ── DRAG ── */
let ox = 0, oy = 0;

dragEl.addEventListener('mousedown', e => {
  isDragging = true;
  dragEl.style.cursor = 'grabbing';
  const r  = dp.getBoundingClientRect();
  ox = e.clientX - r.left;
  oy = e.clientY - r.top;
  dp.style.right  = 'auto';
  dp.style.bottom = 'auto';
  dp.style.left   = r.left + 'px';
  dp.style.top    = r.top  + 'px';
  e.preventDefault();
  e.stopPropagation();
});

document.addEventListener('mousemove', e => {
  if(!isDragging) return;
  let nx = e.clientX - ox;
  let ny = e.clientY - oy;
  nx = Math.max(0, Math.min(nx, window.innerWidth  - dp.offsetWidth));
  ny = Math.max(0, Math.min(ny, window.innerHeight - dp.offsetHeight));
  dp.style.left = nx + 'px';
  dp.style.top  = ny + 'px';
});

document.addEventListener('mouseup', () => {
  if(!isDragging) return;
  isDragging = false;
  dragEl.style.cursor = 'grab';
});

/* ── VISUALIZER ── */
let frame = 0;

function drawRing(ctx, size, isMini){
  ctx.clearRect(0, 0, size, size);
  const cx = size / 2, cy = size / 2;
  const BARS = 60;
  const expanded = dp.classList.contains('expanded');
  const R = isMini ? 34 : (expanded ? 66 : 48);
  const maxAmp = isMini ? 10 : (expanded ? 26 : 11);
  const isPlaying = analyser && !audio.paused;

  if(isPlaying) analyser.getByteFrequencyData(dataArray);

  for(let i = 0; i < BARS; i++){
    const angle = (Math.PI * 2 / BARS) * i - Math.PI / 2;
    let amp = 0;

    if(isPlaying){
      // [수정 최종 본] 원의 중심을 기준으로 좌우 대칭 인덱싱을 부여하여 사방을 빈틈없이 꽉 채웁니다.
      const halfBARS = BARS / 2;
      const symmetricI = i < halfBARS ? i : BARS - 1 - i;
      
      const idx = Math.floor((symmetricI / halfBARS) * (dataArray.length * 0.45));
      amp = Math.pow(dataArray[idx] / 255, 0.65) * maxAmp;
    }

    const x1 = cx + Math.cos(angle) * (R + 1);
    const y1 = cy + Math.sin(angle) * (R + 1);
    const x2 = cx + Math.cos(angle) * (R + 1 + amp);
    const y2 = cy + Math.sin(angle) * (R + 1 + amp);

    const [r, g, b] = barRgb(i, BARS);
    const baseA = light ? 0.5 : 0.18;
    const a = isPlaying
      ? (light ? Math.min(1, 0.5 + amp / 18) : Math.min(1, 0.2 + amp / 22))
      : (expanded ? baseA : baseA * .5);

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = `rgba(${r},${g},${b},${a})`;
    ctx.lineWidth   = isMini ? 1.6 : (expanded ? 2.4 : 1.6);
    ctx.lineCap     = 'round';
    ctx.stroke();
  }
}

function animate(){
  frame++;
  drawRing(vCtx, 160, false);
  drawRing(mCtx, 96,  true);
  requestAnimationFrame(animate);
}
animate();

})();
</script>

</body>
</html>
