<!-- fixed로 화면에 고정, 무선 이어폰 동기화 및 드래그 시 축소 현상 전면 차단 완료 버전 -->
<div id="draggable-player" class="player-minimized fixed bottom-8 right-8 overflow-hidden shadow-2xl border border-cyan-500/20 bg-black/40 backdrop-blur-md z-50 select-none transition-all duration-500 ease-in-out group rounded-full w-[128px] h-[128px] aspect-1/1">
    <style>
        @keyframes spin-disk {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-disk {
            animation: spin-disk 15s linear infinite;
        }
        .animate-pause {
            animation-play-state: paused;
        }
        
        /* 고정 해제(일반) 상태일 때만 호버 시 확장 작동 */
        #draggable-player.player-minimized:not(.is-pinned):hover {
            width: 448px !important;
            height: 280px !important;
            border-radius: 1rem !important;
            aspect-ratio: 16/10 !important;
        }
        /* 💡 드래그 중(is-dragging)일 때는 마우스가 밖으로 튀어도 강제로 와이드 창 형태 유지하여 축소 차단 */
        #draggable-player.is-dragging {
            width: 448px !important;
            height: 280px !important;
            border-radius: 1rem !important;
            aspect-ratio: 16/10 !important;
        }

        /* 일반 호버 상태 및 드래그 중 레이아웃 유지 */
        #draggable-player:not(.is-pinned):hover #disk-wrapper,
        #draggable-player.is-dragging #disk-wrapper {
            padding: 24px !important;
            padding-bottom: 128px !important;
        }
        #draggable-player:not(.is-pinned):hover #inner-disk,
        #draggable-player.is-dragging #inner-disk {
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            border-width: 1px;
        }
        #draggable-player:not(.is-pinned):hover #player-content-layer,
        #draggable-player.is-dragging #player-content-layer {
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        /* 완전히 고정된(is-pinned) 상태의 UI 강제 지정 클래스 */
        #draggable-player.is-pinned {
            width: 448px !important;
            height: 280px !important;
            border-radius: 1rem !important;
            aspect-ratio: 16/10 !important;
        }
        #draggable-player.is-pinned #disk-wrapper {
            padding: 24px !important;
            padding-bottom: 128px !important;
        }
        #draggable-player.is-pinned #inner-disk {
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            border-width: 1px;
        }
        #draggable-player.is-pinned #player-content-layer {
            opacity: 1 !important;
            pointer-events: auto !important;
        }
    </style>

    <!-- 중앙 배치된 원형 디스크 -->
    <div id="disk-wrapper" class="absolute inset-0 flex items-center justify-center p-0 pb-0 pointer-events-none transition-all duration-500 ease-in-out">
        <div id="inner-disk" class="w-32 h-32 relative rounded-full border-0 border-cyan-500/40 shadow-none overflow-hidden bg-black flex items-center justify-center transition-all duration-500 ease-in-out">
            <img id="album-disk" src="/static/yesterday.webp" alt="Cover" class="w-full h-full object-cover rounded-full animate-spin-disk animate-pause">
            <div class="absolute w-4 h-4 rounded-full bg-black border border-white/20 shadow-inner z-20"></div>
        </div>
    </div>
    
    <!-- 플레이어 UI 레이아웃 -->
    <div id="player-content-layer" class="absolute inset-0 flex flex-col justify-between p-6 opacity-0 pointer-events-none transition-opacity duration-300 delay-100">
        <!-- 상단 제목 바 및 우측 제어 시스템 포트 -->
        <div class="flex justify-between items-center">
            <p class="text-sm font-bold text-white tracking-wide drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] pointer-events-none">Yesterday</p>
            <div class="flex items-center gap-2">
                <span id="music-time" class="text-xs text-cyan-300 font-mono bg-black/50 px-2 py-0.5 rounded border border-cyan-500/30 backdrop-blur-sm pointer-events-none">00:00</span>
                
                <!-- 창 고정/해제 토글 버튼 (핀 아이콘) -->
                <button id="pin-toggle-btn" class="text-gray-400 hover:text-cyan-300 transition p-1 rounded-md hover:bg-white/10" title="창 고정/해제">
                    <svg id="pin-unpinned-icon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                    </svg>
                    <svg id="pin-pinned-icon" class="w-4 h-4 text-cyan-400 hidden" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 하단 반투명 컨트롤러 레이어 -->
        <div class="space-y-4 bg-black/20 p-4 border border-white/5 shadow-lg mt-auto rounded-xl relative">
            <div class="relative w-full h-1 bg-white/20 rounded-full cursor-pointer group/progress" id="progress-container">
                <div id="progress-bar" class="absolute top-0 left-0 h-full bg-cyan-400 rounded-full w-0 transition-all duration-100"></div>
                <div id="progress-dot" class="absolute top-1/2 -translate-y-1/2 w-3 h-3 bg-cyan-300 rounded-full opacity-0 group-hover/progress:opacity-100 transition-opacity shadow-[0_0_8px_#22d3ee]" style="left: 0%;"></div>
            </div>

            <div class="flex items-center justify-between px-2">
                <button class="text-cyan-400/60 hover:text-cyan-300 transition"><svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.38 12.18l-1.42 1.42 3.13 3.14L14.5 20H20v-5.5l-2.04 2.04-3.08-3.06z"/></svg></button>
                <button class="text-cyan-400/80 hover:text-cyan-300 transition"><svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                
                <button id="play-btn" class="w-12 h-12 rounded-full bg-cyan-400/30 text-cyan-300 flex items-center justify-center transition hover:bg-cyan-400/50 hover:scale-105 active:scale-95 border border-cyan-400/40 shadow-[0_0_15px_rgba(34,211,238,0.2)]">
                    <svg id="play-icon" class="w-6 h-6 fill-current ml-0.5" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" class="w-6 h-6 fill-current hidden" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                
                <button class="text-cyan-400/80 hover:text-cyan-300 transition"><svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M7 18l8.5-6L7 6v12zm9-12v12h2V6h-2z"/></svg></button>
                <button class="text-cyan-400/60 hover:text-cyan-300 transition"><svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
            </div>
            
            <!-- 우하단 빗금 스타일 드래그 핸들 무늬 -->
            <div id="drag-handle" class="absolute bottom-1.5 right-1.5 w-4 h-4 flex flex-col justify-end items-end gap-[2px] opacity-40 hover:opacity-100 transition-opacity cursor-grab active:cursor-grabbing z-30" style="margin: 0; padding: 0;">
                <div class="flex gap-[2px]"><span class="w-[2px] h-[2px] bg-cyan-300 rounded-full"></span></div>
                <div class="flex gap-[2px]"><span class="w-[2px] h-[2px] bg-cyan-300 rounded-full"></span><span class="w-[2px] h-[2px] bg-cyan-300 rounded-full"></span></div>
                <div class="flex gap-[2px]"><span class="w-[2px] h-[2px] bg-cyan-300 rounded-full"></span><span class="w-[2px] h-[2px] bg-cyan-300 rounded-full"></span><span class="w-[2px] h-[2px] bg-cyan-300 rounded-full"></span></div>
            </div>
        </div>
    </div>

    <!-- 내부 음원 코어 노드 -->
    <audio id="main-audio" preload="auto">
        <source src="/static/yesterday.mp3" type="audio/mpeg">
    </audio>
</div>

<!-- 플레이어 제어 및 무선 이어폰 동기화, 호버 드래그 잠금 스크립트 -->
<script>
    const audio = document.getElementById('main-audio');
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const pauseIcon = document.getElementById('pause-icon');
    const timeDisplay = document.getElementById('music-time');
    const albumDisk = document.getElementById('album-disk');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const progressDot = document.getElementById('progress-dot');
    const player = document.getElementById('draggable-player');
    const dragHandle = document.getElementById('drag-handle');
    
    const pinToggleBtn = document.getElementById('pin-toggle-btn');
    const pinUnpinnedIcon = document.getElementById('pin-unpinned-icon');
    const pinPinnedIcon = document.getElementById('pin-pinned-icon');

    audio.volume = 0.5; 
    let isPinned = false;

    // 통합 UI 상태 동기화 매핑 함수
    function syncPlayerUI(isPlaying) {
        if (isPlaying) {
            playIcon.classList.add('hidden');
            pauseIcon.classList.remove('hidden');
            albumDisk.classList.remove('animate-pause');
        } else {
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
            albumDisk.classList.add('animate-pause');
        }
    }

    // 무선 이어폰 및 하드웨어 미디어 세션 연동 연동
    if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
            title: 'Yesterday',
            artist: '내 기술 스택 배경음악'
        });
        navigator.mediaSession.setActionHandler('play', () => { audio.play().then(() => syncPlayerUI(true)); });
        navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); syncPlayerUI(false); });
    }

    // 고정 장치 토글 핸들러
    pinToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        isPinned = !isPinned;
        
        if (isPinned) {
            player.classList.add('is-pinned');
            player.classList.remove('player-minimized');
            pinUnpinnedIcon.classList.add('hidden');
            pinPinnedIcon.classList.remove('hidden');
        } else {
            player.classList.remove('is-pinned');
            player.classList.add('player-minimized');
            pinUnpinnedIcon.classList.remove('hidden');
            pinPinnedIcon.classList.add('hidden');
        }
    });

    // 60Hz 보정 고성능 드래그 감도 최적화 커널
    let isDragging = false;
    let offsetX = 0;
    let offsetY = 0;
    let currentX = 0;
    let currentY = 0;

    dragHandle.addEventListener('mousedown', (e) => {
        isDragging = true;
        // 💡 드래그가 시작되면 강제로 is-dragging 클래스를 추가해 마우스 포인터 이탈 시 창 닫힘 원천 봉쇄
        player.classList.add('is-dragging');
        
        offsetX = e.clientX - player.getBoundingClientRect().left;
        offsetY = e.clientY - player.getBoundingClientRect().top;
        
        player.style.bottom = 'auto';
        player.style.right = 'auto';
        player.style.transition = 'none';
        
        currentX = e.clientX - offsetX;
        currentY = e.clientY - offsetY;
        
        requestAnimationFrame(renderDrag);
        e.preventDefault();
        e.stopPropagation();
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        currentX = e.clientX - offsetX;
        currentY = e.clientY - offsetY;
    });

    function renderDrag() {
        if (!isDragging) return;
        player.style.left = currentX + 'px';
        player.style.top = currentY + 'px';
        requestAnimationFrame(renderDrag);
    }

    document.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        // 💡 드래그 해제 시 클래스를 빼주어 정상적인 마우스 호버 축소/확장 메커니즘으로 환원
        player.classList.remove('is-dragging');
        player.style.transition = 'width 0.5s ease-in-out, height 0.5s ease-in-out, border-radius 0.5s ease-in-out, aspect-ratio 0.5s ease-in-out, background-color 0.3s, backdrop-filter 0.3s';
    });

    // 메인 재생 버튼 인터랙션 리스너
    playBtn.addEventListener('click', () => {
        if (audio.paused) {
            audio.play().then(() => syncPlayerUI(true)).catch(error => console.log(error));
        } else {
            audio.pause();
            syncPlayerUI(false);
        }
    });

    audio.addEventListener('play', () => syncPlayerUI(true));
    audio.addEventListener('pause', () => syncPlayerUI(false));

    audio.addEventListener('timeupdate', () => {
        const current = Math.floor(audio.currentTime);
        const duration = audio.duration || 0;
        
        const min = String(Math.floor(current / 60)).padStart(2, '0');
        const sec = String(current % 60).padStart(2, '0');
        timeDisplay.textContent = `${min}:${sec}`;

        if (duration > 0) {
            const percent = (audio.currentTime / duration) * 100;
            progressBar.style.width = `${percent}%`;
            progressDot.style.left = `${percent}%`;
        }
    });

    progressContainer.addEventListener('click', (e) => {
        const width = progressContainer.clientWidth;
        const clickX = e.offsetX;
        const duration = audio.duration;
        if (duration > 0) {
            audio.currentTime = (clickX / width) * duration;
        }
    });

    audio.addEventListener('ended', () => {
        syncPlayerUI(false);
        progressBar.style.width = "0%";
        progressDot.style.left = "0%";
        timeDisplay.textContent = "00:00";
    });
</script>
